<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ทะเบียนคุมเบิกจ่ายร้านค้า</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#4f46e5;--primary-dark:#3730a3;
      --success:#10b981;--danger:#ef4444;
      --bg:#f1f5f9;--card:#ffffff;
      --text:#1e293b;--muted:#64748b;--border:#e2e8f0;
      --shadow:0 20px 60px rgba(0,0,0,.12);
      --radius:16px;
    }
    [data-theme=dark]{
      --bg:#0b0f19;--card:#1e293b;
      --text:#f1f5f9;--muted:#94a3b8;--border:#334155;
      --shadow:0 20px 60px rgba(0,0,0,.5);
    }
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Sarabun',sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      transition:background .3s,color .3s;
      position:relative;
    }
    /* Animated background blobs */
    .bg-blob{
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      opacity:.25;
      pointer-events:none;
      animation:blobFloat 8s ease-in-out infinite;
    }
    .bg-blob-1{width:500px;height:500px;background:radial-gradient(circle,#6366f1,#4f46e5);top:-100px;left:-100px;animation-delay:0s}
    .bg-blob-2{width:400px;height:400px;background:radial-gradient(circle,#10b981,#059669);bottom:-80px;right:-80px;animation-delay:3s}
    .bg-blob-3{width:300px;height:300px;background:radial-gradient(circle,#f59e0b,#d97706);top:40%;right:10%;animation-delay:1.5s}
    @keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,20px) scale(1.05)}}

    .login-wrapper{
      position:relative;z-index:10;
      width:100%;max-width:440px;
      padding:20px;
    }
    .login-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:44px 40px;
      box-shadow:var(--shadow);
      animation:slideUp .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

    .login-header{text-align:center;margin-bottom:32px}
    .login-logo-wrap{
      width:72px;height:72px;
      background:linear-gradient(135deg,#6366f1,#4f46e5);
      border-radius:20px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.8rem;color:#fff;
      margin:0 auto 18px;
      box-shadow:0 8px 24px rgba(99,102,241,.4);
    }
    .login-header h1{font-family:'Prompt',sans-serif;font-size:1.4rem;font-weight:700;color:var(--text);line-height:1.3}
    .login-header p{font-size:.85rem;color:var(--muted);margin-top:6px}

    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:7px}
    .form-group label i{margin-right:6px}
    .form-input{
      width:100%;padding:12px 16px;
      border:1.5px solid var(--border);
      border-radius:10px;
      background:var(--bg);color:var(--text);
      font-family:'Sarabun',sans-serif;font-size:.95rem;
      outline:none;transition:border-color .2s,box-shadow .2s;
    }
    .form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}

    .btn-login{
      width:100%;padding:13px;
      background:linear-gradient(135deg,#6366f1,#4f46e5);
      color:#fff;border:none;border-radius:10px;
      font-family:'Prompt',sans-serif;font-size:1rem;font-weight:600;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all .2s;margin-top:8px;
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,241,.45)}
    .btn-login:disabled{opacity:.7;transform:none;cursor:not-allowed}

    .login-error{
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
      color:var(--danger);padding:10px 14px;border-radius:10px;
      font-size:.82rem;margin-bottom:14px;display:none;
    }

    .login-footer{
      display:flex;align-items:center;justify-content:center;
      gap:12px;margin-top:24px;padding-top:20px;
      border-top:1px solid var(--border);
    }
    .role-chip{
      display:flex;align-items:center;gap:6px;
      padding:6px 12px;border-radius:20px;font-size:.75rem;font-weight:600;
    }
    .role-chip.admin{background:rgba(99,102,241,.12);color:#6366f1;border:1px solid rgba(99,102,241,.3)}
    .role-chip.viewer{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.3)}

    .btn-theme{
      position:fixed;top:16px;right:16px;
      width:40px;height:40px;border-radius:50%;
      background:var(--card);border:1px solid var(--border);
      color:var(--muted);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:.9rem;z-index:20;
      box-shadow:0 2px 8px rgba(0,0,0,.1);
      transition:all .2s;
    }
    .btn-theme:hover{border-color:var(--primary);color:var(--primary)}
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <button class="btn-theme" id="btn-theme" title="เปลี่ยนธีม">
    <i class="fa-solid fa-moon"></i>
  </button>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo-wrap">
          <i class="fa-solid fa-file-invoice-dollar"></i>
        </div>
        <h1>ทะเบียนคุมเบิกจ่ายร้านค้า</h1>
        <p>กรุณาเข้าสู่ระบบ — ระบบจะนำคุณไปยังหน้าที่เหมาะสมอัตโนมัติ</p>
      </div>

      <div id="login-error" class="login-error"></div>

      <form id="form-login" autocomplete="on">
        <div class="form-group">
          <label for="login-email"><i class="fa-solid fa-envelope"></i> อีเมล</label>
          <input type="email" id="login-email" class="form-input" placeholder="กรอกอีเมลของคุณ" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password"><i class="fa-solid fa-lock"></i> รหัสผ่าน</label>
          <input type="password" id="login-password" class="form-input" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="btn-submit">
          <i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ
        </button>
      </form>

      <div class="login-footer">
        <span class="role-chip admin"><i class="fa-solid fa-screwdriver-wrench"></i> เจ้าหน้าที่ → จัดการระบบ</span>
        <span class="role-chip viewer"><i class="fa-solid fa-user-tie"></i> ผู้บริหาร → ดูรายงาน</span>
      </div>
    </div>
  </div>

<script>
  // Theme
  const theme = localStorage.getItem('sys_theme') || 'light';
  document.documentElement.dataset.theme = theme;
  updateThemeIcon(theme);

  document.getElementById('btn-theme').addEventListener('click', () => {
    const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = t;
    localStorage.setItem('sys_theme', t);
    updateThemeIcon(t);
  });
  function updateThemeIcon(t) {
    document.getElementById('btn-theme').innerHTML = t === 'dark'
      ? '<i class="fa-solid fa-sun"></i>'
      : '<i class="fa-solid fa-moon"></i>';
  }

  // Firebase
  try { firebase.initializeApp(firebaseConfig); } catch(e) {}
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // If already logged in → redirect
  auth.onAuthStateChanged(async user => {
    if (!user) return;
    await redirectByRole(user);
  });

  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('btn-submit');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังเข้าสู่ระบบ...';
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      await redirectByRole(cred.user);
    } catch(err) {
      const msgs = {
        'auth/invalid-credential':    'อีเมลหรือรหัสผ่านไม่ถูกต้อง',
        'auth/user-not-found':        'ไม่พบบัญชีนี้ในระบบ',
        'auth/wrong-password':        'รหัสผ่านไม่ถูกต้อง',
        'auth/too-many-requests':     'ลองใหม่ภายหลัง (ล็อกอินผิดบ่อยเกินไป)',
        'auth/network-request-failed':'ไม่สามารถเชื่อมต่ออินเตอร์เน็ตได้',
      };
      errEl.textContent   = msgs[err.code] || 'เกิดข้อผิดพลาด: ' + err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ';
    }
  });

  async function redirectByRole(user) {
    try {
      const doc  = await db.collection('users').doc(user.uid).get();
      const role = doc.exists ? (doc.data().role || 'admin') : 'admin';
      // Auto-create doc if missing
      if (!doc.exists) {
        await db.collection('users').doc(user.uid).set({
          email: user.email, displayName: user.displayName || user.email,
          role: 'admin', disabled: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      if (role === 'viewer') {
        window.location.href = 'report.html';
      } else {
        window.location.href = 'admin.html';
      }
    } catch(e) {
      // Firestore error → default go to admin
      window.location.href = 'admin.html';
    }
  }
</script>
</body>
</html>
